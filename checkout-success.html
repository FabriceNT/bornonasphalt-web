<body>

<nav class="nav">
  <div class="nav-inner">
    <a href="index.html" class="logo">
      <img src="img/logo-nav.png"
           alt="Born on Asphalt"
           style="height:52px; width:52px; object-fit:contain; display:block;" />
    </a>
  </div>
</nav>

<section class="hero">
  <div class="sheet-wrap">
    <div class="carbon-shadow"></div>
    <div class="sheet">
      <div class="sheet-top">
        <div class="doc-id">
          DOC NO. <b>BOA-ORDER</b><br/>
          FORM TYPE: ORDER CONFIRMATION
        </div>
        <div class="stamp">PAID</div>
      </div>
      <h1 style="font-size:38px;">Order confirmed</h1>
      <p class="tagline">Your build sheet has been filed. A confirmation email is on its way.</p>
      <p style="font-size:12.5px; color:var(--ink-faded); line-height:1.7;">
        Reference: <span id="sessionRef">—</span><br/>
        Your order is now being sent to production. You'll get a tracking number by email once it ships.
      </p>
      <div class="hero-cta">
        <a href="index.html#shop" class="btn">Continue shopping</a>
      </div>
    </div>
  </div>
</section>

<script>
  const params = new URLSearchParams(window.location.search);
  const paymentIntentId = params.get('payment_intent');
  if(paymentIntentId){
    document.getElementById('sessionRef').textContent = paymentIntentId;
  }
  // Order succeeded — clear the local cart.
  localStorage.removeItem('boa_cart');

  // Meta Pixel — Purchase (déduplication via event_id)
  if (typeof fbq !== 'undefined' && paymentIntentId) {
    // Récupérer le total depuis l'URL si disponible, sinon 0
    const amount = parseFloat(params.get('amount') || '0');
    fbq('track', 'Purchase', {
      value: amount,
      currency: 'USD',
      content_type: 'product',
      event_id: 'purchase_' + paymentIntentId
    }, { eventID: 'purchase_' + paymentIntentId });
  }

</script>

</body>
</html>
