<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reset Password — Born on Asphalt</title>
<link rel="stylesheet" href="css/style.css?v=7">
<style>
  .reset-wrapper {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
    background: var(--bg-dark, #111);
  }
  .reset-box {
    max-width: 420px;
    width: 100%;
    background: var(--bg-card, #1a1a1a);
    border: 1px solid #2a2a2a;
    padding: 40px 32px;
  }
  .reset-logo {
    font-size: 0.85rem;
    letter-spacing: 0.25em;
    color: #8B0000;
    margin-bottom: 28px;
    font-family: 'IBM Plex Mono', monospace;
  }
  .reset-box h1 {
    font-family: 'Oswald', sans-serif;
    font-size: 1.6rem;
    letter-spacing: 0.08em;
    margin-bottom: 24px;
    color: var(--ink-light, #e8e0d0);
  }
  .reset-box .form-field {
    margin-bottom: 16px;
  }
  .reset-box label {
    display: block;
    font-size: 0.75rem;
    letter-spacing: 0.15em;
    color: #888;
    margin-bottom: 6px;
    font-family: 'IBM Plex Mono', monospace;
  }
  .reset-box input[type="password"] {
    width: 100%;
    padding: 12px;
    background: #111;
    border: 1px solid #333;
    color: #e8e0d0;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.9rem;
    box-sizing: border-box;
  }
  .reset-error {
    color: #c0392b;
    font-size: 0.8rem;
    font-family: 'IBM Plex Mono', monospace;
    margin-bottom: 12px;
    min-height: 18px;
  }
  .reset-success {
    color: var(--ink-light, #e8e0d0);
    font-family: 'IBM Plex Mono', monospace;
    line-height: 1.7;
  }
  .reset-success a {
    color: #8B0000;
    text-decoration: none;
  }
</style>
</head>
<body>
<div class="reset-wrapper">
  <div class="reset-box">
    <div class="reset-logo">BORN ON ASPHALT</div>

    <div id="resetForm">
      <h1>NEW PASSWORD</h1>
      <div class="form-field">
        <label>NEW PASSWORD</label>
        <input type="password" id="newPassword" placeholder="Minimum 8 characters" />
      </div>
      <div class="form-field">
        <label>CONFIRM PASSWORD</label>
        <input type="password" id="confirmPassword" placeholder="Repeat your password" />
      </div>
      <div class="reset-error" id="resetError"></div>
      <button class="btn" id="resetBtn" style="width:100%;">SET NEW PASSWORD</button>
    </div>

    <div id="resetSuccess" style="display:none;">
      <h1>PASSWORD UPDATED.</h1>
      <p class="reset-success">
        Your password has been changed.<br><br>
        <a href="/">← Back to the shop</a>
      </p>
    </div>

    <div id="resetInvalid" style="display:none;">
      <h1>LINK EXPIRED.</h1>
      <p class="reset-success">
        This reset link is invalid or has expired.<br>
        Links are valid for 1 hour.<br><br>
        <a href="/">← Request a new one</a>
      </p>
    </div>
  </div>
</div>

<script>
(function() {
  const params = new URLSearchParams(window.location.search);
  const token = params.get('token');

  if (!token || token.length !== 64) {
    document.getElementById('resetForm').style.display = 'none';
    document.getElementById('resetInvalid').style.display = 'block';
    return;
  }

  document.getElementById('resetBtn').addEventListener('click', async () => {
    const password = document.getElementById('newPassword').value;
    const confirm  = document.getElementById('confirmPassword').value;
    const errorEl  = document.getElementById('resetError');
    const btn      = document.getElementById('resetBtn');

    errorEl.textContent = '';

    if (password.length < 8) {
      errorEl.textContent = 'Password must be at least 8 characters.';
      return;
    }
    if (password !== confirm) {
      errorEl.textContent = 'Passwords do not match.';
      return;
    }

    btn.disabled = true;
    btn.textContent = 'SAVING...';

    try {
      const res = await fetch('/api/auth-reset-password.php', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ token, password })
      });
      const data = await res.json();

      if (data.success) {
        document.getElementById('resetForm').style.display = 'none';
        document.getElementById('resetSuccess').style.display = 'block';
      } else if (res.status === 400) {
        document.getElementById('resetForm').style.display = 'none';
        document.getElementById('resetInvalid').style.display = 'block';
      } else {
        errorEl.textContent = data.error || 'Something went wrong. Try again.';
        btn.disabled = false;
        btn.textContent = 'SET NEW PASSWORD';
      }
    } catch (e) {
      errorEl.textContent = 'Connection error. Try again.';
      btn.disabled = false;
      btn.textContent = 'SET NEW PASSWORD';
    }
  });
})();
</script>
</body>
</html>
